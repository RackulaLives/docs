name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialise deploys so a slower older run can't finish after — and overwrite — a newer one.
concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Least privilege: the job only checks out code and deploys via Cloudflare
    # secrets — it never needs to write to the repo with GITHUB_TOKEN.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
